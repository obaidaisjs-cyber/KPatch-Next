name: Build and Patch Custom Boot

on:
  workflow_dispatch:
    inputs:
      boot_url:
        description: 'boot url'
        required: true
        default: 'https://catbox.moe'

jobs:
  patch_boot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wget

      - name: Download KPatch Executable
        run: |
          mkdir -p tools/kpatch
          wget -O tools/kpatch/kpatch https://github.com || wget -O tools/kpatch/kpatch https://github.com
          chmod +x tools/kpatch/kpatch

      - name: Download User Boot
        run: |
          wget -O boot.img "${{ github.event.inputs.boot_url }}"

      - name: Execute Patching
        run: |
          ./tools/kpatch/kpatch patch -b boot.img -o patched_boot.img

      - name: Upload Patched Image
        uses: actions/upload-artifact@v4
        with:
          name: Patched_Boot_Poco_X5_Pro
          path: patched_boot.img
